all:
  vars:
    # The generated inventory is assumed to be used from the clab host.
    # Hence no http proxy should be used. Therefore we make sure the http
    # module does not attempt using any global http proxy.
    ansible_httpapi_use_proxy: false
  children:
    linux:
      hosts:
        clab-network-topology-client1:
          ansible_host: 192.168.0.10
        clab-network-topology-client2:
          ansible_host: 192.168.0.5
        clab-network-topology-client3:
          ansible_host: 192.168.0.7
        clab-network-topology-client4:
          ansible_host: 192.168.0.3
        clab-network-topology-client5:
          ansible_host: 192.168.0.2
        clab-network-topology-client6:
          ansible_host: 192.168.0.8
        clab-network-topology-client7:
          ansible_host: 192.168.0.9
        clab-network-topology-client8:
          ansible_host: 192.168.0.6
        clab-network-topology-internet:
          ansible_host: 192.168.0.4
        clab-network-topology-server1:
          ansible_host: 192.168.0.101
        clab-network-topology-server2:
          ansible_host: 192.168.0.102
    mikrotik_ros:
      vars:
        # ansible_connection: set ansible_connection variable if required
        ansible_user: admin
        ansible_password: admin
      hosts:
        clab-network-topology-access-l2-1:
          ansible_host: 192.168.50.1
        clab-network-topology-access-l2-2:
          ansible_host: 192.168.50.2
        clab-network-topology-access-l2-3:
          ansible_host: 192.168.50.3
        clab-network-topology-access-l2-4:
