[defaults]
inventory = ./hosts.ini
transport = libssh
collections_paths = /usr/lib/python3/dist-packages/ansible_collections
host_key_checking = False
retry_files_enabled = False
deprecation_warnings = False
[ssh_connection]
ssh_args = -o MACs=hmac-sha1,hmac-md5 -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedKeyTypes=+ssh-rsa