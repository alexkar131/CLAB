---
- name: edge-r1 (MikroTik)
  hosts: edge
  gather_facts: no
  tasks:
    - name: command
      community.routeros.command:
        commands:
          - /user ssh-keys import user=kar public-key-file=kar_ssh_key.pub
          - /system/identity set name=edge-r1
          - /interface/ethernet/ set [find default-name=ether3] name=ether3-WAN3

          - /interface/bridge/ add name=LAN
          - /interface/bridge/port/ add bridge=LAN interface=ether1
          - /interface/bridge/port/ add bridge=LAN interface=ether2
          - /ip/address/ add address=192.168.10.2/24 interface=WAN3
          - /ip/address/ add address=192.168.60.1/24 interface=LAN
          - /ip/dns/ set servers=77.88.8.8,77.88.8.1
          - /ip route add dst-address=0.0.0.0/0 gateway=172.31.255.29
          - /ip firewall nat add chain=srcnat out-interface=LAN action=masquerade
          - /ipv6/settings/ set disable-ipv6=yes



          - /ip firewall address-list add address=192.168.0.1 list=admin
          - /ip firewall filter add chain=input action=reject reject-with=tcp-reset protocol=tcp tcp-flags=syn,ack connection-state=new
          - /ip firewall filter add chain=input action=accept connection-state=established
          - /ip firewall filter add chain=input action=accept connection-state=related
          - /ip firewall filter add chain=input action=drop connection-state=invalid
          - /ip firewall filter add chain=input action=accept protocol=icmp icmp-options=8
          - /ip firewall filter add chain=input action=accept protocol=icmp icmp-options=11
          - /ip firewall filter add chain=input action=accept protocol=icmp icmp-options=3:4
          - /ip firewall filter add chain=input action=accept protocol=tcp src-address=172.16.0.0/12 dst-port=22
          - /ip firewall filter add chain=input action=accept protocol=tcp in-interface=LAN src-address-list=admin dst-port=22
          - /ip firewall filter add chain=input action=drop

          - /ip firewall filter add chain=forward action=accept connection-state=established
          - /ip firewall filter add chain=forward action=accept connection-state=related
          - /ip firewall filter add chain=forward action=drop connection-state=invalid
          - /ip firewall filter add chain=forward action=accept in-interface=LAN src-address=192.168.60.0/24
          - /ip firewall filter add chain=forward action=accept protocol=tcp dst-address=192.168.10.2 dst-port=3389
          - /ip firewall filter add chain=forward action=drop


          - /system/ntp/client/ set enabled=yes
          - /system/ntp/client/servers/ add address=ru.pool.ntp.org
          - /system/clock/ set time-zone-autodetect=no time-zone-name=Asia/Krasnoyarsk


          - /ip service set telnet disabled=yes
          - /ip service set ftp disabled=yes
          - /ip service set www disabled=yes
          - /ip service set api disabled=yes
          - /ip service set api-ssl disabled=yes
          - /ip service set winbox disabled=yes
          - /ip ssh set always-allow-password-login=no
          - /user set admin disabled=yes
          - /user set kar password=""